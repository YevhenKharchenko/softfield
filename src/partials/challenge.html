<section class="section challenge-section" id="challenge">
  <div class="section-title-wrapper challenge-title-wrapper">
    <picture>
      <source
        srcset="./img/common/wave-top-light-desk.png"
        media="(min-width: 1440px)"
        width="1440"
        height="88" />
      <source
        srcset="./img/common/wave-top-light-mob.png"
        width="375"
        height="40" />
      <img
        class="wave-img"
        src="./img/common/wave-top-light-mob.png"
        alt="Wave"
        width="375"
        height="40"
    /></picture>
    <div class="container section-title-container">
      <h2 class="section-title challenge-title">Growing Challenge</h2>
    </div>
  </div>
  <div class="challenge-bg-wrapper">
    <div class="container challenge-container">
      <div class="challenge-content-wrapper">
        <div class="challenge-text-wrapper">
          <p class="section-subtitle challenge-subtitle">
            From Simple to Strategic
          </p>
          <p class="challenge-text">
            The game gets harder as you get better at it, which is nice because
            you won't get bored. Start with easy matches to learn the basics.
            Then face:
          </p>
          <ul class="challenge-list">
            <li class="challenge-list-item">
              <svg class="challenge-icon" width="24" height="24">
                <use href="./img/sprite.svg#icon-star"></use>
              </svg>
              <p class="challenge-item-text">Multi-layer targets</p>
            </li>
            <li class="challenge-list-item">
              <svg class="challenge-icon" width="24" height="24">
                <use href="./img/sprite.svg#icon-star"></use>
              </svg>
              <p class="challenge-item-text">Stuck gummy bears</p>
            </li>
            <li class="challenge-list-item">
              <svg class="challenge-icon" width="24" height="24">
                <use href="./img/sprite.svg#icon-star"></use>
              </svg>
              <p class="challenge-item-text">Tight board layouts</p>
            </li>
            <li class="challenge-list-item">
              <svg class="challenge-icon" width="24" height="24">
                <use href="./img/sprite.svg#icon-star"></use>
              </svg>
              <p class="challenge-item-text">Limited move challenges</p>
            </li>
          </ul>
        </div>
        <picture>
          <source
            srcset="./img/challenge/challenge-img-desk.png"
            media="(min-width: 1440px)"
            width="1440"
            height="622" />
          <source
            srcset="./img/challenge/challenge-img-mob.png"
            width="375"
            height="162" />
          <img
            class="challenge-img"
            src="./img/challenge/challenge-img-mob.png"
            alt="Screenshot of the game"
            width="375"
            height="162"
            loading="lazy"
        /></picture>
      </div>
    </div>
  </div>
</section>
